<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Center - Anekdote Auth</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <style>
        main {
            max-width: 600px;
            margin-top: 3rem;
        }

        .text-center {
            text-align: center;
        }

        section {
            margin-bottom: 2rem;
        }
    </style>
</head>

<body>
    <main class="container">
        <h2 class="text-center">Account Center</h2>
        <p class="text-center">Welcome back, {{ .User.Email }}</p>

        <article>
            <section>
                <h3>Profile Details</h3>
                <form method="POST" action="/account/profile">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" value="{{ .User.Name }}" required>
                    <button type="submit" class="contrast outline">Update Profile</button>
                </form>
            </section>

            <hr>

            <section>
                <h3>Change Password</h3>
                <form method="POST" action="/account/password">
                    <label for="old_password">Current Password</label>
                    <input type="password" id="old_password" name="old_password" required>

                    <label for="new_password">New Password</label>
                    <input type="password" id="new_password" name="new_password" required minlength="6">

                    <button type="submit" class="secondary outline">Change Password</button>
                </form>
            </section>

            <hr>

            <section class="text-center">
                <form method="POST" action="/logout">
                    <button type="submit" class="outline"
                        style="color: var(--pico-del-color); border-color: var(--pico-del-color);">Logout</button>
                </form>
            </section>
        </article>
    </main>
</body>

</html>
